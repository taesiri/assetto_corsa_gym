load_offline_data: False    # offline pre-training and data loading
pre_train: False            # pre train using offline data before start online training
dataset_path: null          # Path to the datasets, null means it will be overridden by the command line if needed
work_dir: null              # Path to run the model from (default: None)
task: AssettoCorsaGym
seed: 0

# wandb
disable_wandb: False
wandb_entity: null  # user
wandb_project: sac
wandb_silent: False
exp_name: null
task_title: null
save_csv: True
save_video: False
save_agent: False
action_dim: null  # placeholder
steps: null # placeholder

Agent:
  num_steps: 8_000_000
  batch_size: 128
  memory_size: 8_000_000
  offline_buffer_size: 12_000_000
  use_offline_buffer: False # offline dual buffer
  update_interval: 1
  start_steps: 2000
  log_interval: 10
  eval_interval: 0
  num_eval_episodes: 1
  checkpoint_freq: 200_000

SAC:
  gamma: 0.992
  nstep: 3
  policy_lr: 0.0003
  q_lr: 0.0003
  entropy_lr: 0.0003
  policy_hidden_units: [256, 256, 256]
  policy_mean_bias: [0.0, 0.35, -0.25]
  policy_log_std_bias: [-2.0, -1.0, -1.4]
  q_hidden_units: [256, 256, 256]
  target_update_coef: 0.005
  log_interval: 10

DisCor:
  error_lr: 0.0003
  error_hidden_units: [256, 256, 256, 256]
  tau_init: 10.0

AssettoCorsa:
  ego_sampling_freq: 25     # in Hz
  max_episode_py_time: 600. # in seconds
  gap_const: 12.
  eval_number_of_laps: 4    # including out lap which is incomplete
  save_lap_csv: False
  remote_machine_ip: "localhost"   # "192.168.0.1" # "localhost"
  ego_server_port: 2345
  opponents_server_port: 2346
  simulation_management_server_port: 2347
  use_relative_actions: True
  enable_sensors: True
  vjoy_executed_by_server: True
  enable_out_of_track_termination: True
  enable_low_speed_termination: True
  recover_car_on_done: False
  send_reset_at_start: True
  record_controls_from_client: False
  enable_out_of_track_penalty: False
  max_laps_number: null
  enable_task_id_in_obs: False
  penalize_actions_diff: False
  penalize_actions_diff_coef: 0.1
  max_steer_rate: 900.0   # steering: deg/s
  track: "ks_barcelona-layout_gp"  # monza ks_barcelona-layout_gp ks_red_bull_ring-layout_gp, indianapolis_sp, ks_silverstone-gp
  car: "dallara_f317"              # dallara_f317, ks_mazda_miata, bmw_z4_gt3
  use_ac_out_of_track: True
  add_previous_obs_to_state: True
  use_reference_line_in_reward: True
  use_target_speed: False
  use_action_prior_sampling: True
  action_prior_mean: [0.0, 0.55, -0.9]
  action_prior_std: [0.08, 0.18, 0.06]
  use_state_action_bias: True
  action_bias_curvature_scale: 0.02
  action_bias_gap_scale: 3.0
  action_bias_steer_base: 0.65
  action_bias_throttle_delta: 0.14
  action_bias_brake_delta: 0.22
  action_bias_brake_release: 0.28
  use_heuristic_speed_reward: False
  heuristic_target_speed_min: 12.0
  heuristic_target_speed_max: 45.0
  heuristic_target_speed_curvature_scale: 0.02
  heuristic_target_speed_power: 0.75
  overspeed_margin: 1.5
  overspeed_penalty_coef: 0.0
  overspeed_penalty_power: 1.0
  turn_gap_penalty_coef: 0.0
  heading_error_penalty_coef: 0.0
  steer_change_penalty_coef: 0.0
  action_bias_overspeed_window: 6.0
  action_bias_overspeed_throttle_cut: 0.0
  action_bias_overspeed_brake_gain: 0.0
  use_reference_steer_bias: False
  reference_steer_lookahead: 18.0
  reference_steer_gain: 0.85
  reference_steer_yaw_rate_gain: 0.18
  reference_steer_lateral_gain: 0.035
  reference_steer_blend: 0.55
  reference_steer_speed_min: 12.0
  use_turn_speed_control_bias: False
  turn_throttle_cap_gain: 0.70
  turn_brake_floor_gain: 0.45
  screen_capture_enable: False
  # This should be a multiple of the resolution set in Assetto Corsa to avoid cropping and padding
  # AC configured Using 640x480
  final_image_width: 320      # Final image width in pixels
  final_image_height: 240     # Final image height in pixels
  color_mode: "gray"           # Options: "gray" or "bgr"
  use_obs_extra: False
